<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QA Reference Viewer</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #111;
      }
      .frame {
        width: 100%;
        height: 100%;
        border: 0;
      }
    </style>
  </head>
  <body>
    <embed class="frame" id="pdf" type="application/pdf" />
    <script>
      const params = new URLSearchParams(window.location.search);
      const file = params.get('file') || 'desktop.pdf';
      const safe = file.replace(/[^a-zA-Z0-9._-]/g, '');
      document.getElementById('pdf').src = `/qa-refs/${safe}`;
    </script>
  </body>
</html>
